name: Build and Release Obsidian

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:
    inputs:
      version:
        description: 'Release Version (e.g. 0.0.1beta)'
        required: true
        default: '0.0.1beta'
      emby_server_url:
        description: 'Emby Server URL (e.g. https://emby.yourdomain.com)'
        required: false
        default: ''

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'

    - name: Install dependencies
      run: npm ci || npm install

    - name: Build Application
      run: npm run build
      env:
        VITE_EMBY_SERVER_URL: ${{ github.event.inputs.emby_server_url || secrets.VITE_EMBY_SERVER_URL || vars.VITE_EMBY_SERVER_URL }}
        VITE_EMBY_DEVICE_ID: ${{ secrets.VITE_EMBY_DEVICE_ID || vars.VITE_EMBY_DEVICE_ID || 'obsidian-web' }}
        VITE_EMBY_CLIENT_NAME: ${{ secrets.VITE_EMBY_CLIENT_NAME || vars.VITE_EMBY_CLIENT_NAME || 'Obsidian Web Client' }}
        VITE_EMBY_VERSION: ${{ secrets.VITE_EMBY_VERSION || vars.VITE_EMBY_VERSION || '1.0.0' }}

    - name: Upload Build Artifact
      uses: actions/upload-artifact@v4
      with:
        name: obsidian-build-${{ github.sha }}
        path: dist/
        retention-days: 7

    - name: Zip Build Output
      if: github.event_name == 'workflow_dispatch'
      run: zip -r obsidian-v${{ github.event.inputs.version }}.zip dist/

    - name: Publish to GitHub Releases
      if: github.event_name == 'workflow_dispatch'
      uses: softprops/action-gh-release@v2
      with:
        tag_name: v${{ github.event.inputs.version }}
        name: 🚀 Release v${{ github.event.inputs.version }}
        files: obsidian-v${{ github.event.inputs.version }}.zip
        generate_release_notes: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
